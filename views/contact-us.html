<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - MyStore</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/navbar.css">
<link rel="stylesheet" href="/css/footer.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="container" style="padding:40px 0; max-width:600px;">
  <h2 class="section-title">Contact Us</h2>
  <div class="card" style="padding:24px;">
    <p class="mb-2">Have a question about your order, a product, or anything else? We'd love to help.</p>

    <div class="form-group">
      <label>Email us at</label>
      <div style="display:flex; gap:10px;">
        <input type="text" id="supportEmail" value="support@mystore.com" readonly style="flex:1;">
        <button class="btn btn-secondary" id="copyEmailBtn">Copy</button>
        <a href="mailto:support@mystore.com" class="btn btn-primary">Open Email App</a>
      </div>
      <small class="text-muted">If "Open Email App" doesn't do anything, it just means no default mail app is set up on this device — copy the email instead and use it in Gmail/Outlook/etc directly.</small>
    </div>

    <hr class="mt-2 mb-2">

    <h3 class="mb-2">Or send us a message</h3>
    <form id="contactForm">
      <div class="form-group"><label>Your Name</label><input type="text" id="contactName" required></div>
      <div class="form-group"><label>Your Email</label><input type="email" id="contactEmail" required></div>
      <div class="form-group"><label>Message</label><textarea id="contactMessage" rows="4" required></textarea></div>
      <button class="btn btn-primary btn-block" type="submit">Send Message</button>
    </form>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="/js/utils.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/main.js"></script>
<script>
document.getElementById('copyEmailBtn').addEventListener('click', async () => {
  const email = document.getElementById('supportEmail').value;
  try {
    await navigator.clipboard.writeText(email);
    showToast('Email copied to clipboard!', 'success');
  } catch (err) {
    showToast('Could not copy - please select and copy manually', 'error');
  }
});

document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  // This posts to a backend endpoint that emails your support inbox (see src/routes/contact.js).
  // If you haven't wired that up yet, this falls back to opening a pre-filled mailto link instead.
  const name = document.getElementById('contactName').value;
  const email = document.getElementById('contactEmail').value;
  const message = document.getElementById('contactMessage').value;

  try {
    await api.post('/contact', { name, email, message }, { auth: false });
    showToast('Message sent! We will get back to you soon.', 'success');
    e.target.reset();
  } catch (err) {
    // Fallback: open a pre-filled mailto so the user's message isn't lost
    const subject = encodeURIComponent(`Message from ${name}`);
    const body = encodeURIComponent(`${message}\n\nFrom: ${name} (${email})`);
    window.location.href = `mailto:support@mystore.com?subject=${subject}&body=${body}`;
  }
});
</script>
</body>
</html>
