<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Orders - Admin</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/navbar.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="container" style="padding:30px 0;">
  <h2 class="section-title">Manage Orders</h2>
  <div id="adminOrdersList"><div class="spinner"></div></div>
</section>
<script src="/js/utils.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/main.js"></script>
<script>
const STATUSES = ['pending','confirmed','processing','shipped','delivered','cancelled','refunded'];
async function loadAdminOrders() {
  const el = document.getElementById('adminOrdersList');
  try {
    const res = await api.get('/admin/orders?limit=50');
    el.innerHTML = res.data.map(o => `
      <div class="card" style="padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
        <span>${o.order_number} - ${formatPrice(o.total_amount)}</span>
        <select data-id="${o.id}" class="status-select">
          ${STATUSES.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
    `).join('');
    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async () => {
        await api.patch(`/admin/orders/${sel.dataset.id}/status`, { status: sel.value });
        showToast('Order status updated', 'success');
      });
    });
  } catch (err) { el.innerHTML = `<p class="text-danger">${err.message}</p>`; }
}
document.addEventListener('DOMContentLoaded', loadAdminOrders);
</script>
</body>
</html>
