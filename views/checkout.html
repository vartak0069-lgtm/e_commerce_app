<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - MyStore</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/navbar.css">
<link rel="stylesheet" href="/css/footer.css">
<link rel="stylesheet" href="/css/checkout.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="container" style="padding:30px 0;">
  <h2 class="section-title">Checkout</h2>
  <div class="checkout-grid">
    <div>
      <h3 class="mb-2">Delivery Address</h3>
      <div id="addressList"><div class="spinner"></div></div>
      <a href="/addresses.html" class="text-muted">+ Add new address</a>

      <h3 class="mt-3 mb-2">Have a coupon?</h3>
      <div style="display:flex; gap:10px;">
        <input type="text" id="couponCode" placeholder="Enter coupon code" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--color-border);">
        <button class="btn btn-secondary" id="applyCouponBtn">Apply</button>
      </div>
    </div>
    <div class="card" style="padding:20px;">
      <h3>Order Summary</h3>
      <div id="orderSummary" class="mt-2"><div class="spinner"></div></div>
      <button class="btn btn-primary btn-block mt-3" id="placeOrderBtn">Pay & Place Order</button>
      <p class="text-muted mt-2" style="font-size:12px;">Test mode payment - use Razorpay test card 4111 1111 1111 1111, any future expiry, any CVV.</p>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="/js/utils.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/main.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
