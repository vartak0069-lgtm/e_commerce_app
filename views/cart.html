<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart - MyStore</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/navbar.css">
<link rel="stylesheet" href="/css/footer.css">
<link rel="stylesheet" href="/css/cart.css">
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="container" style="padding:30px 0;">
  <h2 class="section-title">Your Cart</h2>
  <div style="display:grid; grid-template-columns:2fr 1fr; gap:24px;">
    <div id="cartItems"><div class="spinner"></div></div>
    <div class="card cart-summary" id="cartSummary" style="padding:20px;">
      <h3>Order Summary</h3>
      <div style="display:flex; justify-content:space-between; margin:14px 0;">
        <span>Subtotal</span><strong id="subtotalAmount">₹0</strong>
      </div>
      <a href="/checkout.html" class="btn btn-primary btn-block">Proceed to Checkout</a>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="/js/utils.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/main.js"></script>
<script src="/js/cart.js"></script>
</body>
</html>
