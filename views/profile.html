<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - MyStore</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/navbar.css">
<link rel="stylesheet" href="/css/footer.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="container" style="padding:30px 0; max-width:500px;">
  <h2 class="section-title">My Profile</h2>
  <form id="profileForm" class="card" style="padding:20px;">
    <div class="form-group"><label>Name</label><input type="text" id="name"></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" disabled></div>
    <div class="form-group"><label>Phone</label><input type="text" id="phone"></div>
    <button class="btn btn-primary btn-block" type="submit">Save Changes</button>
  </form>

  <h3 class="mt-3 mb-2">Change Password</h3>
  <form id="passwordForm" class="card" style="padding:20px;">
    <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword"></div>
    <div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div>
    <button class="btn btn-secondary btn-block" type="submit">Update Password</button>
  </form>
</section>
<div id="footer-placeholder"></div>
<script src="/js/utils.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/validator.js"></script>
<script src="/js/main.js"></script>
<script>
async function loadProfile() {
  try {
    const res = await api.get('/auth/me');
    document.getElementById('name').value = res.data.name;
    document.getElementById('email').value = res.data.email;
    document.getElementById('phone').value = res.data.phone || '';
  } catch (err) { showToast(err.message, 'error'); }
}
document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api.put('/users/me', { name: document.getElementById('name').value, phone: document.getElementById('phone').value });
    showToast('Profile updated!', 'success');
  } catch (err) { showToast(err.message, 'error'); }
});
document.getElementById('passwordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api.put('/users/me/password', {
      currentPassword: document.getElementById('currentPassword').value,
      newPassword: document.getElementById('newPassword').value
    });
    showToast('Password changed!', 'success');
    e.target.reset();
  } catch (err) { showToast(err.message, 'error'); }
});
document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
