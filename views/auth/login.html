<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MyStore</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/navbar.css">
<link rel="stylesheet" href="/css/footer.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="container" style="padding:60px 0; max-width:400px;">
  <h2 class="section-title text-center">Login</h2>
  <form id="loginForm" class="card" style="padding:24px;">
    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
    <button class="btn btn-primary btn-block" type="submit">Login</button>
    <p class="text-center mt-2"><a href="/auth/forgot-password.html" class="text-muted">Forgot password?</a></p>
    <p class="text-center mt-1">New here? <a href="/auth/register.html">Create an account</a></p>
  </form>
</section>
<div id="footer-placeholder"></div>
<script src="/js/utils.js"></script>
<script src="/js/api-client.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/validator.js"></script>
<script src="/js/main.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
